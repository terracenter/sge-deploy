# ============================================================================
# SSH HARDENING - SGE Production VPS
# Basado en: Mozilla Modern, CIS Benchmark, Post-Quantum
# Instalar en: /etc/ssh/sshd_config.d/10-sshd-settings.conf
# Nota: No modifica sshd_config principal — las actualizaciones del sistema
#       no sobreescribirán esta configuración.
# ============================================================================

# 1. CRIPTOGRAFÍA Y ALGORITMOS
# ----------------------------------------------------------------------------
# KEX: incluye sntrup761x25519 para resistencia post-cuántica
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256@libssh.org,curve25519-sha256,diffie-hellman-group16-sha512

# Cifrados: ChaCha20-Poly1305 preferido por velocidad y resistencia
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr

# MACs: versiones EtM (Encrypt-then-MAC) para evitar ataques de relleno
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com

# 2. AUTENTICACIÓN Y ACCESO
# ----------------------------------------------------------------------------
# Sin acceso directo a root — usar sudo para trazabilidad
PermitRootLogin no

# Solo llaves públicas — sin contraseñas (no hay FreeIPA en este servidor)
PasswordAuthentication no
PermitEmptyPasswords no

# PAM activo (necesario para sudo y PAM modules)
UsePAM yes
KbdInteractiveAuthentication no

# Solo usuarios del grupo sudo pueden entrar
AllowGroups sudo

# Intentos máximos y sesiones simultáneas
MaxAuthTries 3
MaxSessions 2

# 3. SEGURIDAD OPERATIVA
# ----------------------------------------------------------------------------
# VERBOSE: registra huella digital de la llave usada (vital para auditoría)
SyslogFacility AUTH
LogLevel VERBOSE

# Cerrar sesiones inactivas tras 5 minutos
ClientAliveInterval 300
ClientAliveCountMax 0

# Deshabilitar túneles y reenvíos (previene movimiento lateral)
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no
PermitUserEnvironment no

# Sin DNS inverso (evita demoras y spoofing)
UseDNS no

# Anti-DoS: límite de conexiones simultáneas en fase de login
MaxStartups 10:30:60

# Banner legal obligatorio
Banner /etc/ssh/sshd_config.d/banner
