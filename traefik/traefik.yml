global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  filePath: /var/log/sge/traefik.log

accessLog:
  filePath: /var/log/sge/traefik-access.log
  bufferingSize: 100

api:
  dashboard: false  # disabled in production

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      middlewares:
        - security-headers@file

# Only file provider (all services are native on localhost — no Docker)
providers:
  file:
    directory: /etc/sge/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${ACME_EMAIL}
      storage: /etc/sge/traefik/acme.json
      tlsChallenge: {}
