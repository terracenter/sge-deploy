name: sge-ha

# ─────────────────────────────────────────────────────────────────────────────
# SGE HA Docker — Entorno Humanbyte
# Uso:
#   docker compose up -d                    → infraestructura + app
#   docker compose --profile replica up -d  → + réplica PostgreSQL
#
# Prerrequisitos:
#   - .env configurado (cp .env.example .env)
#   - scripts/00-setup-lvm.sh ejecutado (almacenamiento)
#   - scripts/01-setup-replication.sh ejecutado (replicación PG)
#   - Dockerfiles en Sge-Go y sge-panel presentes
#   - Claves JWT en Sge-Go/configs/keys/
#   - Claves Ed25519 en sge-panel/keys/
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ───────────────────────────────────────────────────────────────────────────
  # POSTGRESQL PRIMARIO
  # pg_wal separado vía POSTGRES_INITDB_WALDIR + bind mount LVM
  # ───────────────────────────────────────────────────────────────────────────
  postgres-primary:
    image: postgres:18-bookworm
    container_name: sge-ha-pg-primary
    environment:
      POSTGRES_DB: sge_platform
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums --encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - type: bind
        source: /srv/ha/pg-primary-data
        target: /var/lib/postgresql
      - type: bind
        source: /srv/ha/sge-data
        target: /srv/sge_data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - sge-ha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d sge_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # POSTGRESQL RÉPLICA
  # Activar solo después de ejecutar scripts/01-setup-replication.sh
  # docker compose --profile replica up -d postgres-replica
  # ───────────────────────────────────────────────────────────────────────────
  postgres-replica:
    image: postgres:18-bookworm
    container_name: sge-ha-pg-replica
    profiles: [replica]
    volumes:
      - type: bind
        source: /srv/ha/pg-replica-data
        target: /var/lib/postgresql
      - type: bind
        source: /srv/ha/pg-replica-wal
        target: /var/lib/postgresql/pg_wal
    networks:
      - sge-ha-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # PGBOUNCER — pool de conexiones hacia el primario
  # Pool mode: session (compatible con prepared statements de pgx)
  # ───────────────────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: sge-ha-pgbouncer
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_NAME: sge_platform
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      SERVER_IDLE_TIMEOUT: 600
      AUTH_TYPE: scram-sha-256
      IGNORE_STARTUP_PARAMETERS: search_path
    networks:
      - sge-ha-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${DB_USER}"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # REDIS — cache y rate limiting
  # ───────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-bookworm
    container_name: sge-ha-redis
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    volumes:
      - type: bind
        source: /srv/ha/redis-data
        target: /data
    networks:
      - sge-ha-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # NATS — mensajería asíncrona con JetStream
  # ───────────────────────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: sge-ha-nats
    command:
      - "--name=sge-ha-nats"
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    volumes:
      - type: bind
        source: /srv/ha/nats-data
        target: /data
    networks:
      - sge-ha-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # SGE BACKEND — instancia 1 de 2
  # Traefik balancea automáticamente entre backend-1 y backend-2
  # mediante el nombre compartido del servicio: traefik.http.services.sge-api
  # ───────────────────────────────────────────────────────────────────────────
  sge-backend-1:
    build:
      context: ../../../Sge-Go
      dockerfile: docker/Dockerfile.backend
    image: sge-backend:latest
    container_name: sge-ha-backend-1
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      DB_HOST: pgbouncer
      DB_PORT: "5432"
      DB_NAME: sge_platform
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222
      SGE_PANEL_URL: "http://sge-ha-panel-backend:8090"
      SEED_ADMIN_EMAIL: "admin@sge.local"
      SEED_ADMIN_PASSWORD: "admin123"
      JWT_PRIVATE_KEY_PATH: /app/configs/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/configs/keys/public.pem
      CORS_ALLOWED_ORIGINS: "https://${SGE_DOMAIN},https://100.69.62.114,https://192.168.122.10,http://100.69.62.114,http://192.168.122.10"
      SGE_INSTALLATION_ID: ${SGE_INSTALLATION_ID:-}
      SGE_FINGERPRINT: ${SGE_FINGERPRINT:-}
    volumes:
      - type: bind
        source: ../../../Sge-Go/configs/keys
        target: /app/configs/keys
        read_only: true
      - type: volume
        source: sge-etc
        target: /etc/sge
    networks:
      - sge-ha-network
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sge-api.rule=PathPrefix(`/sge/api`)"
      - "traefik.http.routers.sge-api.entrypoints=web"
      - "traefik.http.routers.sge-api.priority=200"
      - "traefik.http.routers.sge-api.middlewares=sge-stripprefix"
      - "traefik.http.middlewares.sge-stripprefix.stripprefix.prefixes=/sge"
      - "traefik.http.services.sge-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.sge-api-tls.rule=PathPrefix(`/sge/api`)"
      - "traefik.http.routers.sge-api-tls.entrypoints=websecure"
      - "traefik.http.routers.sge-api-tls.tls=true"
      - "traefik.http.routers.sge-api-tls.priority=200"
      - "traefik.http.routers.sge-api-tls.middlewares=sge-stripprefix"
      - "traefik.http.routers.sge-api-tls.service=sge-api"
      - "traefik.http.routers.sge-api-v1-tls.rule=PathPrefix(`/api/v1`)"
      - "traefik.http.routers.sge-api-v1-tls.entrypoints=websecure"
      - "traefik.http.routers.sge-api-v1-tls.tls=true"
      - "traefik.http.routers.sge-api-v1-tls.priority=300"
      - "traefik.http.routers.sge-api-v1-tls.service=sge-api"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8000/health/live > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # SGE BACKEND — instancia 2 de 2
  # ───────────────────────────────────────────────────────────────────────────
  sge-backend-2:
    image: sge-backend:latest
    container_name: sge-ha-backend-2
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      DB_HOST: pgbouncer
      DB_PORT: "5432"
      DB_NAME: sge_platform
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222
      JWT_PRIVATE_KEY_PATH: /app/configs/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/configs/keys/public.pem
      CORS_ALLOWED_ORIGINS: "https://${SGE_DOMAIN},https://100.69.62.114,https://192.168.122.10,http://100.69.62.114,http://192.168.122.10"
      SGE_PANEL_URL: "http://sge-ha-panel-backend:8090"
      SEED_ADMIN_EMAIL: "admin@sge.local"
      SEED_ADMIN_PASSWORD: "admin123"
      SGE_INSTALLATION_ID: ${SGE_INSTALLATION_ID:-}
      SGE_FINGERPRINT: ${SGE_FINGERPRINT:-}
    volumes:
      - type: bind
        source: ../../../Sge-Go/configs/keys
        target: /app/configs/keys
        read_only: true
      - type: volume
        source: sge-etc
        target: /etc/sge
    networks:
      - sge-ha-network
    depends_on:
      - sge-backend-1   # esperar a que la imagen esté construida
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.sge-api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8000/health/live > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # SGE FRONTEND — Next.js standalone
  # ───────────────────────────────────────────────────────────────────────────
  sge-frontend:
    build:
      context: ../../../Sge-Go
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_BASE_PATH: /sge
    image: sge-frontend:latest
    container_name: sge-ha-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "https://${SGE_DOMAIN}/api/v1"
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    networks:
      - sge-ha-network
    depends_on:
      sge-backend-1:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sge-web.rule=PathPrefix(`/sge`)"
      - "traefik.http.routers.sge-web.entrypoints=web"
      - "traefik.http.routers.sge-web.priority=100"
      - "traefik.http.services.sge-web.loadbalancer.server.port=3001"
      - "traefik.http.routers.sge-web-tls.rule=PathPrefix(`/sge`)"
      - "traefik.http.routers.sge-web-tls.entrypoints=websecure"
      - "traefik.http.routers.sge-web-tls.tls=true"
      - "traefik.http.routers.sge-web-tls.priority=100"
      - "traefik.http.routers.sge-web-tls.service=sge-web"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3001/sge > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # SGE-PANEL BACKEND — Go API
  # Conecta directo al primario (sin pgBouncer — volumen de conexiones bajo)
  # ───────────────────────────────────────────────────────────────────────────
  sge-panel-backend:
    build:
      context: ../../../sge-panel
      dockerfile: Dockerfile.backend
    image: sge-panel-backend:latest
    container_name: sge-ha-panel-backend
    environment:
      PORT: "8090"
      DB_HOST: postgres-primary
      DB_PORT: "5432"
      DB_NAME: sge_panel
      DB_USER: ${PANEL_DB_USER}
      DB_PASSWORD: ${PANEL_DB_PASSWORD}
      PRIVATE_KEY_PATH: /app/keys/private.pem
      SGE_HTTPS: "true"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - type: bind
        source: ../../../sge-panel/keys
        target: /app/keys
        read_only: true
    networks:
      - sge-ha-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.panel-api.rule=PathPrefix(`/sge-panel/api`)"
      - "traefik.http.routers.panel-api.entrypoints=web"
      - "traefik.http.routers.panel-api.priority=200"
      - "traefik.http.routers.panel-api.middlewares=panel-stripprefix"
      - "traefik.http.middlewares.panel-stripprefix.stripprefix.prefixes=/sge-panel"
      - "traefik.http.services.panel-api.loadbalancer.server.port=8090"
      - "traefik.http.services.panel-api.loadbalancer.healthcheck.path=/readyz"
      - "traefik.http.services.panel-api.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.panel-api.loadbalancer.healthcheck.timeout=5s"
      - "traefik.http.routers.panel-api-tls.rule=PathPrefix(`/sge-panel/api`)"
      - "traefik.http.routers.panel-api-tls.entrypoints=websecure"
      - "traefik.http.routers.panel-api-tls.tls=true"
      - "traefik.http.routers.panel-api-tls.priority=200"
      - "traefik.http.routers.panel-api-tls.middlewares=panel-stripprefix"
      - "traefik.http.routers.panel-api-tls.service=panel-api"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # SGE-PANEL FRONTEND — Next.js standalone
  # ───────────────────────────────────────────────────────────────────────────
  sge-panel-frontend:
    build:
      context: ../../../sge-panel
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_BASE_PATH: /sge-panel
    image: sge-panel-frontend:latest
    container_name: sge-ha-panel-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "https://${PANEL_DOMAIN}/api"
      BACKEND_URL: "http://sge-panel-backend:8090"
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
    networks:
      - sge-ha-network
    depends_on:
      sge-panel-backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.panel-web.rule=PathPrefix(`/sge-panel`) && !PathPrefix(`/sge-panel/api`)"
      - "traefik.http.routers.panel-web.entrypoints=web"
      - "traefik.http.routers.panel-web.priority=150"
      - "traefik.http.services.panel-web.loadbalancer.server.port=3002"
      - "traefik.http.routers.panel-web-tls.rule=PathPrefix(`/sge-panel`) && !PathPrefix(`/sge-panel/api`)"
      - "traefik.http.routers.panel-web-tls.entrypoints=websecure"
      - "traefik.http.routers.panel-web-tls.tls=true"
      - "traefik.http.routers.panel-web-tls.priority=150"
      - "traefik.http.routers.panel-web-tls.service=panel-web"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3002/sge-panel > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # TRAEFIK — reverse proxy + TLS
  # Dashboard: http://<IP>:8888
  # ───────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:latest
    container_name: sge-ha-traefik
    environment:
      DOCKER_API_VERSION: "1.41" 
    ports:
      - "80:80"
      - "443:443"
      - "8888:8080"   # dashboard — cerrar en firewall cuando no se use
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/ha/traefik-certs:/etc/traefik/acme
      - /srv/ha/traefik-certs/custom:/etc/traefik/certs:ro
    networks:
      - sge-ha-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
# Red interna
# ─────────────────────────────────────────────────────────────────────────────
networks:
  sge-ha-network:
    driver: bridge
    name: sge-ha-network

# ─────────────────────────────────────────────────────────────────────────────
# Volúmenes nombrados
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  sge-etc:
    name: sge-ha-etc
