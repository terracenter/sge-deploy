# ─────────────────────────────────────────────────────────────────────────────
# pg_hba.conf — PostgreSQL 18 primario HA Humanbyte
# ─────────────────────────────────────────────────────────────────────────────

# Tipo    Base de datos    Usuario        Dirección              Método
# ─────────────────────────────────────────────────────────────────────────────

# Acceso local del proceso postgres (necesario para initdb y scripts internos)
local   all              postgres                               trust
local   all              all                                    md5

# ─── Replicación streaming ────────────────────────────────────────────────────
# El usuario replicator se crea en scripts/01-setup-replication.sh
host    replication      replicator      0.0.0.0/0              scram-sha-256

# ─── Aplicación SGE (desde containers en sge-ha-network) ─────────────────────
host    sge_platform     sge             0.0.0.0/0              scram-sha-256

# ─── sge-panel (conecta directo al primario, sin pgBouncer) ──────────────────
host    sge_panel        sge_panel       0.0.0.0/0              scram-sha-256

# ─── Acceso de administración (debug / make db-shell) ────────────────────────
host    all              postgres        127.0.0.1/32           trust
