# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL 18 — Configuración primario HA Humanbyte
# Optimizado para: 2–4 vCPU, 4–8 GB RAM (ajustar shared_buffers según RAM)
# ─────────────────────────────────────────────────────────────────────────────

# ── Conexiones ────────────────────────────────────────────────────────────────
listen_addresses = '*'
max_connections = 200          # pgBouncer reduce conexiones reales al DB

# ── Memoria ───────────────────────────────────────────────────────────────────
shared_buffers = 1GB           # 25% de RAM disponible
effective_cache_size = 3GB     # 75% de RAM disponible
work_mem = 8MB                 # Por operación de sort/hash
maintenance_work_mem = 256MB   # Para VACUUM, CREATE INDEX

# ── WAL y checkpoint ──────────────────────────────────────────────────────────
wal_level = replica            # Requerido para streaming replication
wal_buffers = 64MB
min_wal_size = 512MB
max_wal_size = 2GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# ── Replicación streaming ──────────────────────────────────────────────────────
max_wal_senders = 5
wal_keep_size = 512MB          # WAL retenido para réplica
hot_standby = on               # La réplica acepta consultas de solo lectura
synchronous_commit = on        # Durabilidad garantizada (off = más velocidad, menos durabilidad)

# ── I/O ──────────────────────────────────────────────────────────────────────
effective_io_concurrency = 100  # SSD → 100-200; HDD → 2
random_page_cost = 1.1          # SSD; para HDD usar 4.0

# ── Logging ──────────────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off         # Docker captura stderr directamente
log_min_duration_statement = 1000  # Loguear queries > 1 segundo
log_connections = off
log_disconnections = off
log_line_prefix = '%t [%p] %u@%d '

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# ── Locale y encoding ─────────────────────────────────────────────────────────
# Se establece en initdb — no modificar aquí
