# ─────────────────────────────────────────────────────────────────────────────
# Traefik v3 — Entorno HA Humanbyte
# ─────────────────────────────────────────────────────────────────────────────

log:
  level: INFO

ping: {}

api:
  dashboard: true
  insecure: true   # dashboard en :8888

# ─────────────────────────────────────────────────────────────────────────────
# Entry points — HTTP sin redirect (testing con IP)
# ─────────────────────────────────────────────────────────────────────────────
entryPoints:
  web:
    address: ":80"

  websecure:
    address: ":443"

# ─────────────────────────────────────────────────────────────────────────────
# Proveedores
# ─────────────────────────────────────────────────────────────────────────────
providers:
  docker:
    exposedByDefault: false
    network: sge-ha-network

# ─────────────────────────────────────────────────────────────────────────────
# Certificados TLS
# ─────────────────────────────────────────────────────────────────────────────
certificatesResolvers:

  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web

  selfsigned: {}
